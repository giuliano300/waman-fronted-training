<h1 mat-dialog-title>CONFIRM DELETION</h1>
<h2 mat-dialog-title>Are you sure you want to delete this item?</h2>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()" class="btn back">Close</button>
  <button mat-button (click)="onConfirm()" class="btn confirm-button">Delete</button>
</mat-dialog-actions>
